# meta.yaml — Metadaten für manuell hochgeladene Fotos
#
# VERWENDUNG:
#   1. Fotos in dieses Verzeichnis (uploads/) kopieren
#   2. Metadaten hier eintragen (optional — KI beschreibt Fotos automatisch)
#   3. Script ausführen: python3 scripts/upload_photos.py
#
# FELDER pro Foto:
#   date:        Aufnahmedatum YYYY-MM-DD
#   persons:     Wer ist auf dem Foto? (Liste)
#   place:       Ortsname (z.B. "Hamburg", "Winningen")
#   lat/lon:     GPS-Koordinaten (optional)
#   description: Manuelle Beschreibung (überschreibt KI-Analyse)

defaults:
    user_id: "00000000-0000-0000-0000-000000000001"

